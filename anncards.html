     <style>
     body{
        background: #f2f2f2;
     }
     header{
        background:#222;
        color:white;
        padding:20px 50px;
        display: flex;
        justify-content:space-between;
        align-items:center;
     }
     header nav a{
        color: white;
        text-decoration: none;
        margin-left: 20px;
        font-size: 18px;
     }
     header nav a:hover{
        color:orange;
     }
     .cards{
        width:90%;
        margin:40px auto;
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:25px;
     }
     .shop-cards{
        background:white;
        border-radius:10px;
        padding:20px;
        text-align:center;
        position:relative;
        animation: rotateBox 2s linear infinite;
    }

    @keyframes rotateBox {

        from {
            transform: rotate(0deg);
        }

        to {
            transform: rotate(360deg);
        }

    }
        
    .shop-cards h2::first-letter{
        color: red;

     }
     .shop-cards1{
        background:white;
        border-radius:10px;
        padding:20px;
        text-align:center;
        position:relative;
        box-shadow:0 5px 15px gray;
        animation: fadeIn 2s ease infinite alternate;
     }
     @keyframes fadeIn {
        from {
            opacity: 0;
        }

        to {
            opacity: 1;
        }
    }
    .shop-cards1 p::first-letter{
        color: red;
    }
    
      .shop-cards2{
        background:white;
        border-radius:10px;
        padding:20px;
        text-align:center;
        position:relative;
        animation: bounce 1s infinite;
    }

    @keyframes bounce {

        0%,
        100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(-30px);
        }

    }
    .shop-cards2 button:hover{
        background:green;
    }
    .shop-cards2 p::selection{
        background:pink;
        color:white;
    }
     .shop-cards2 h2::first-line{
        color:red;
    } 
        .shop-cards3{
        background:white;
        border-radius:10px;
        padding:20px;
        text-align:center;
        position:relative;
        animation: move1 3s ease-in-out infinite alternate;
    }

    @keyframes move1 {
        from {
            left: 0;
        }

        to {
            left: 500px;
        }
    }
    footer{
        background: #222;
        color:white;
        text-align:center;
        padding: 20px;
    }

    </style>
</head>
